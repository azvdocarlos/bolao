{% extends "base.html" %}
{% block content %}
<h2>Ranking Geral</h2>
<table class="table table-striped table-hover mt-3">
    <thead class="table-dark">
        <tr>
            <th>Posição</th>
            <th>Usuário</th>
            <th>Pontos</th>
        </tr>
    </thead>
    <tbody>
        {% for user in users %}
        <tr>
            <td>{{ loop.index }}º</td>
            <td>{{ user.username }}</td>
            <td><strong>{{ user.points_total }}</strong></td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
